version: 1
applications:
  - appRoot: apps/tenant-admin
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @saas-platform/tenant-admin build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: Cache-Control
              value: 'public, max-age=31536000, immutable'
        - pattern: index.html
          headers:
            - key: Cache-Control
              value: 'no-cache, no-store, must-revalidate'
