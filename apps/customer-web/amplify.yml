version: 1
applications:
  - appRoot: apps/customer-web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - echo "node-linker=hoisted" > .npmrc
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @saas-platform/customer-web build
      artifacts:
        baseDirectory: apps/customer-web/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/customer-web/.next/cache/**/*
