version: 1
applications:
  - appRoot: apps/customer-web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @saas-platform/customer-web build
            # standalone output doesn't include static assets, copy them manually
            - cp -r .next/static .next/standalone/apps/customer-web/.next/static
            - if [ -d public ]; then cp -r public .next/standalone/apps/customer-web/public; fi
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
