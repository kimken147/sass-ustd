version: 1
applications:
  - appRoot: apps/customer-web
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
        build:
          commands:
            - cd ../.. && pnpm --filter @saas-platform/customer-web build
            # Amplify SSR requires node_modules with 'next' in the build output
            - cp -r node_modules .next/node_modules
            - cp package.json .next/package.json
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
